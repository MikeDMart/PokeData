<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex — Field Guide</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" />
  <meta name="description" content="A minimal Pokédex. Search any Pokémon and explore their data." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb" id="bgOrb"></div>
  <div class="bg-grain"></div>

  <!-- ── POKÉBALL OVERLAY ── -->
  <div id="pb-overlay">
    <canvas id="pbCanvas"></canvas>
    <div class="pb-ball" id="pbBall">
      <div class="pb-top"><div class="pb-shine"></div></div>
      <div class="pb-seam">
        <div class="pb-btn"><div class="pb-core" id="pbCore"></div></div>
      </div>
      <div class="pb-bot"></div>
    </div>
    <div class="pb-flash" id="pbFlash"></div>
  </div>

  <!-- ── HEADER ── -->
  <header class="header" id="header">
    <div class="header-inner">

      <div class="wordmark">
        <span class="wordmark-num">Nº</span>
        <span class="wordmark-title">Pokédex</span>
        <span class="wordmark-sub">Field Guide</span>
      </div>

      <form class="search-form" id="searchForm" autocomplete="off">
        <div class="search-wrap">
          <input type="text" id="searchInput" class="search-input"
            placeholder="Name or number…" spellcheck="false" />
          <button type="submit" class="search-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
          </button>
        </div>
      </form>

      <div class="header-controls">
        <button class="btn-icon" id="btnTheme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="btn-icon" id="btnMute" title="Toggle sound">
          <svg class="icon-sound" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg class="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
      </div>

    </div>
    <!-- Recents row -->
    <div class="recents" id="recents"></div>
  </header>

  <!-- ── MAIN ── -->
  <main class="main" id="main">

    <!-- Welcome -->
    <div class="welcome-state" id="welcomeState">
      <div class="welcome-inner">
        <div class="welcome-pokeball">
          <div class="pokeball">
            <div class="pokeball-top"></div>
            <div class="pokeball-mid"></div>
            <div class="pokeball-bot"></div>
            <div class="pokeball-btn"></div>
          </div>
        </div>
        <p class="welcome-hint">Search any Pokémon by name or National Pokédex number</p>
        <div class="starter-row">
          <button class="starter-chip" data-name="bulbasaur">Bulbasaur</button>
          <button class="starter-chip" data-name="charmander">Charmander</button>
          <button class="starter-chip" data-name="squirtle">Squirtle</button>
          <button class="starter-chip" data-name="pikachu">Pikachu</button>
          <button class="starter-chip" data-name="eevee">Eevee</button>
          <button class="starter-chip" data-name="mewtwo">Mewtwo</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="loader-ring"></div>
    </div>

    <!-- Error -->
    <div class="error-state" id="errorState">
      <div class="error-icon">?</div>
      <h3 class="error-title">Not found in the Pokédex</h3>
      <p class="error-msg" id="errorMsg">Check the name or number and try again.</p>
      <button class="starter-chip" id="btnErrorRandom" style="margin-top:1rem">✦ Try a random one</button>
    </div>

    <!-- Pokémon card — two panel, viewport fitted -->
    <article class="poke-card" id="pokeCard">

      <!-- LEFT: artwork + type + controls -->
      <div class="poke-left">

        <!-- Nav row: prev · number · next -->
        <div class="poke-nav-row">
          <button class="btn-nav" id="btnPrev" title="Previous Pokémon" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="poke-number" id="pokeNumber">#001</div>
          <button class="btn-nav" id="btnNext" title="Next Pokémon" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>

        <div class="poke-artwork-wrap" id="artworkWrap">
          <img class="poke-artwork" id="pokeArtwork" alt="" loading="eager" />
          <div class="poke-artwork-shadow"></div>

          <!-- Animated sprite shown as corner badge -->
          <div class="sprite-badge" id="spriteBadge" title="Animated sprite">
            <img class="sprite-anim" id="spriteAnim" alt="" />
          </div>

          <!-- Shiny toggle -->
          <button class="shiny-btn" id="shinyBtn" title="Toggle shiny">✦</button>

          <!-- Favorites button -->
          <button class="fav-btn" id="favBtn" title="Add to favorites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>

        <!-- Generation badge -->
        <div class="poke-gen-badge" id="pokeGenBadge"></div>

        <div class="poke-types" id="pokeTypes"></div>

        <div class="left-controls">
          <button class="btn-random" id="btnRandom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/>
              <path d="m18 2 4 4-4 4"/>
              <path d="M2 6h1.9c1.5 0 2.9.9 3.5 2.2"/>
              <path d="M22 18h-5.9c-1.3 0-2.5-.6-3.3-1.7l-.5-.8"/>
              <path d="m18 14 4 4-4 4"/>
            </svg>
            Random
          </button>
          <button class="btn-cry" id="btnCry" title="Play cry">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- RIGHT: info, internally scrollable -->
      <div class="poke-right">

        <div class="poke-name-block">
          <h1 class="poke-name" id="pokeName">—</h1>
          <div class="poke-genus" id="pokeGenus"></div>
        </div>

        <!-- Flavor text with cycling -->
        <div class="poke-flavor-wrap">
          <p class="poke-flavor" id="pokeFlavor"></p>
          <button class="btn-flavor-cycle" id="btnFlavorCycle" title="Next entry">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.45"/>
            </svg>
          </button>
        </div>

        <!-- Metrics -->
        <div class="poke-metrics">
          <div class="metric">
            <span class="metric-val" id="pokeHeight">—</span>
            <span class="metric-key">Height</span>
          </div>
          <div class="metric-div"></div>
          <div class="metric">
            <span class="metric-val" id="pokeWeight">—</span>
            <span class="metric-key">Weight</span>
          </div>
          <div class="metric-div"></div>
          <div class="metric">
            <span class="metric-val" id="pokeExp">—</span>
            <span class="metric-key">Base XP</span>
          </div>
          <div class="metric-div"></div>
          <div class="metric">
            <span class="metric-val" id="pokeCatchRate">—</span>
            <span class="metric-key">Catch Rate</span>
          </div>
        </div>

        <!-- Species chips row (gender, egg groups, friendship) -->
        <div class="poke-species-row" id="pokeSpeciesRow"></div>

        <!-- Abilities -->
        <div class="poke-section">
          <div class="section-label">Abilities</div>
          <div class="abilities-row" id="pokeAbilities"></div>
        </div>

        <!-- Type Matchups -->
        <div class="poke-section">
          <div class="section-label">Type Matchups</div>
          <div class="type-matchups" id="pokeMatchups"></div>
        </div>

        <!-- Base Stats -->
        <div class="poke-section">
          <div class="section-label">Base Stats</div>
          <div class="stats-list" id="pokeStats"></div>
          <div class="stat-total-row">
            <span class="stat-total-label">Total</span>
            <span class="stat-total-val" id="pokeStatTotal">—</span>
          </div>
        </div>

        <!-- Evolution Chain -->
        <div class="poke-section" id="evoSection" style="display:none">
          <div class="section-label">Evolution Chain</div>
          <div class="evo-chain" id="evoChain"></div>
        </div>

        <!-- Moves -->
        <div class="poke-section">
          <div class="section-label">Moves <span class="moves-note">(first 12)</span></div>
          <div class="moves-wrap" id="pokeMoves"></div>
        </div>

      </div>
    </article>

  </main>

  <script src="app.js"></script>
</body>
</html>
